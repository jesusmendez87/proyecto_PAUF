name: test angular

on:
  push:
    branches: [ "render-7" ]
  pull_request:
    branches: [ "render-7" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.21.0]

    steps:
    - uses: actions/checkout@v4

    - name: instalar dependencias
      run: npm install

    - name: ejecutar tests
      run: npm run test -- --watch=false --browsers=ChromeHeadless


    - name: Build Angular
      run: npm run build -- --configuration production
